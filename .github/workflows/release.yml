name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "AGENTS.md"
      - "plans/**"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Test
        run: npm test

      - name: Validate package contents
        run: npm pack --dry-run

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    if: github.repository == 'favoyang/planrock' && vars.NPM_TRUSTED_PUBLISHING_READY == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx -y -p semantic-release@25 -p @semantic-release/git semantic-release
